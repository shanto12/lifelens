[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."ingest-run"]
  schedule = "@daily"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/snapshot"
  to = "/.netlify/functions/snapshot"
  status = 200

[[redirects]]
  from = "/api/insights-brief"
  to = "/.netlify/functions/insights-brief"
  status = 200

[[redirects]]
  from = "/api/alternatives"
  to = "/.netlify/functions/alternatives"
  status = 200

[[redirects]]
  from = "/api/call-script"
  to = "/.netlify/functions/call-script"
  status = 200

[[redirects]]
  from = "/api/call-initiate"
  to = "/.netlify/functions/call-initiate"
  status = 200

[[redirects]]
  from = "/api/action"
  to = "/.netlify/functions/action"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Cross-Origin-Opener-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
